<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Tasks</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    text-decoration: none;
    list-style-type: none;
}

body {
    font-family: Arial, sans-serif;
    padding: 10px;
}

.heading_title {
    width: 90%;
    max-width: 600px;
    margin: 20px auto;
    display: flex;
    gap: 5px;
    justify-content: center;
}

.heading_title h3 {
    background-color: rgb(153, 167, 179);
    padding: 10px;
    color: black;
    flex: 1;
    text-align: center;
}

.heading_title a:hover h3 {
    background-color: rgb(26, 151, 9);
    color: #fff;
    cursor: pointer;
}

.nav1 {
    width: 90%;
    max-width: 600px;
    margin: 20px auto;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
}

.nav2 {
    display: flex;
    gap: 10px;
    background-color: rgb(26, 151, 9);
    padding: 10px;
    border-radius: 5px;
}

.table_row {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    width: 90%;
    max-width: 600px;
    margin: 10px auto;
    padding: 10px;
    background-color: rgb(200, 207, 212);
    border-radius: 5px;
}

.table_row div {
    margin: 5px 0;
    display: flex;
    align-items: center;
    gap: 5px;
}

/* Actions buttons aligned to right */
.table_row .actions {
    justify-content: flex-end;
}

/* MOBILE ADJUSTMENTS */
@media (max-width: 480px) {
    .table_row {
        flex-direction: column;
        align-items: flex-start;
    }

    .table_row div {
        flex: 1 1 100%;
    }

    .table_row .actions {
        justify-content: flex-start;
        gap: 10px;
    }

    .heading_title {
        flex-direction: column;
        gap: 10px;
    }

    .heading_title h3 {
        flex: 1 1 100%;
    }

    .nav1 {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }
}
</style>
</head>
<body>

{% include './topbar.html'%}

<!-- Heading Tabs -->
<div class="heading_title">
    <a href=""><h3>All</h3></a>
    <a href="{% url 'pendTaskurl' %}"><h3>Pending</h3></a>
    <a href="{% url 'completeTaskurl' %}"><h3>Completed</h3></a>
</div>

<!-- Navigation -->
<div class="nav1">
    <h3>Tasks</h3>
    <div class="nav2">
        <a href="{% url 'addTaskurl' %}"><h3>Add Tasks</h3></a>
    </div>
</div>

<!-- Task Rows -->
<div>
{% for eachtodo in alltodo %}
<div class="table_row">
    <div>{{ eachtodo.title }}</div>
    <div>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71z"/>
        </svg>
        <span>{{ eachtodo.statue }}</span>
    </div>
    <div class="actions">
        <a href="{% url 'editTaskurl' eachtodo.id %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"> 
                <path d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207zm-7.468 7.468A.5.5 0 0 1 6 13.5V13h-.5a.5.5 0 0 1-.5-.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.5-.5V10h-.5a.5.5 0 0 1-.175-.032l-.179.178a.5.5 0 0 0-.11.168l-2 5a.5.5 0 0 0 .65.65l5-2a.5.5 0 0 0 .168-.11z"/>
            </svg>
        </a>
        <a href="{% url 'deleteTaskurl' eachtodo.id %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path d="M0 2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2z"/>
            </svg>
        </a>
    </div>
</div>
{% endfor %}
</div>

</body>
</html>
