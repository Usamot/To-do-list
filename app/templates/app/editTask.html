<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    form {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    input[type="submit"] {
      padding: 10px 20px;
      background-color: #1a9709;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.3s;
    }

    input[type="submit"]:hover {
      background-color: #145e06;
    }

    /* Responsive adjustments */
    @media (max-width: 480px) {
      form {
        padding: 10px;
        gap: 10px;
      }

      input[type="submit"] {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  {% include './topbar.html'%} 
  <h1>EDIT PAGE</h1>

  <form action="" method="post">
    {% csrf_token %}

    <div>
      <label for="id_title">Title:</label>
      <input type="text" name="title" maxlength="1000" required value="{{myTodo.title}}" id="id_title">
    </div>

    <div>
      <label for="id_text">Text:</label>
      <input type="text" name="text" maxlength="1000" required value="{{myTodo.text}}" id="id_text">
    </div>

    <div>
      <label for="id_statue">Statue:</label>
      <input type="text" name="statue" maxlength="10" required value="{{myTodo.statue}}" id="id_statue">
    </div>

    <input type="submit" value="Submit Form">
  </form>
</body>
</html>
