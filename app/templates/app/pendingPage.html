<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pending Tasks</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 15px;
    }

    .table_row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      background-color: rgb(200, 207, 212);
      padding: 10px;
      margin-bottom: 5px;
      align-items: center;
    }

    .table_row th, .table_row td {
      margin: 5px 0;
      flex: 1 1 30%;
    }

    .table_row td svg, .table_row th svg {
      vertical-align: middle;
      margin-right: 5px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* Responsive adjustments */
    @media (max-width: 600px) {
      .table_row {
        flex-direction: column;
        align-items: flex-start;
      }

      .table_row th, .table_row td {
        flex: 1 1 100%;
      }

      .table_row td {
        display: flex;
        align-items: center;
        gap: 5px;
      }
    }
  </style>
</head>
<body>
  {% include './topbar.html'%}

  <div>
    {% for eachtodo in pendingTodo %}
      <table class="table">
        <tr class="table_row">
          <th>{{ eachtodo.title }}</th>
          <td>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-clock-fill" viewBox="0 0 16 16">
              <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71z"/>
            </svg>
            <span>{{ eachtodo.statue }}</span>
          </td>
          <td>
            <a href="{% url 'editTaskurl' eachtodo.id %}">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pencil-fill" viewBox="0 0 16 16"> 
                <path d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207zm-7.468 7.468A.5.5 0 0 1 6 13.5V13h-.5a.5.5 0 0 1-.5-.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.5-.5V10h-.5a.5.5 0 0 1-.175-.032l-.179.178a.5.5 0 0 0-.11.168l-2 5a.5.5 0 0 0 .65.65l5-2a.5.5 0 0 0 .168-.11z"/>
              </svg>
            </a>

            <a href="{% url 'deleteTaskurl' eachtodo.id %}">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-square-fill" viewBox="0 0 16 16">
                <path d="M0 2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2z"/>
              </svg>
            </a>
          </td>
        </tr>
      </table>
    {% endfor %}
  </div>
</body>
</html>
